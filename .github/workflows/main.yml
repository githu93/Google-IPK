name: Build IPK Paulo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixando o Codigo
        uses: actions/checkout@v4

      - name: Instalar Ferramentas LG
        run: |
          sudo npm install -g @webos-tools/cli --unsafe-perm

      - name: Criando Imagens Faltantes e Gerando IPK
        run: |
          mkdir -p build
          
          # Baixa imagens provisórias para o robô não reclamar de falta de arquivos
          wget -qO icon.png https://github.com/fluidicon.png
          cp icon.png largeIcon.png
          cp icon.png backgroundImage.png
          
          # Gera o pacote IPK agora com todos os arquivos presentes
          ares-package . --out ./build

      - name: Download do Arquivo Final
        uses: actions/upload-artifact@v4
        with:
          name: App-Paulo-TV
          path: ./build/*.ipk
