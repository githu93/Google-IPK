<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Navegador Paulo TV</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: white; 
        }
        /* O segredo: vamos usar a tela toda para o Google */
        #browser {
            width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>
    <!-- Carrega o Google de um jeito que aceita buscas -->
    <iframe id="browser" src="https://www.google.com/webhp?igu=1"></iframe>

    <script>
        // Esse script ajuda a evitar o erro -27 em alguns links
        var frame = document.getElementById('browser');
        frame.onload = function() {
            console.log("Navegador pronto!");
        };
    </script>
</body>
</html>
