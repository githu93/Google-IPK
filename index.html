<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Navegador IA Paulo - Voz Ativa</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #interface-ia { position: fixed; top: 0; width: 100%; background: rgba(15, 15, 15, 0.95); padding: 15px; z-index: 10000; border-bottom: 2px solid #00ff00; display: flex; gap: 10px; align-items: center; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        #pergunta { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #00ff00; background: #000; color: #00ff00; font-size: 16px; }
        #btn-enviar { padding: 12px 25px; background: #00ff00; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #navegador { width: 100%; height: calc(100% - 80px); margin-top: 80px; border: none; background: white; }
    </style>
</head>
<body>

    <div id="interface-ia">
        <input type="text" id="pergunta" placeholder="Fale com a IA ou relate um erro...">
        <button id="btn-enviar" onclick="perguntarIA()">ENVIAR</button>
    </div>

    <iframe id="navegador" src="https://www.google.com/webhp?igu=1"></iframe>

    <script>
        const CHAVE = "AIzaSyBh_JjoG8K2EKJqf2AAD3zUEd1MCO7GpCQ";
        const input = document.getElementById('pergunta');

        // FUNÇÃO PARA A IA FALAR
        function falar(texto) {
            const mensagem = new SpeechSynthesisUtterance(texto);
            mensagem.lang = "pt-BR";
            mensagem.rate = 1.1; // Um pouco mais rápido para parecer inteligente
            window.speechSynthesis.speak(mensagem);
        }

        // BOAS-VINDAS (Ativa ao clicar em qualquer lugar da tela na primeira vez)
        window.addEventListener('click', () => {
            if (!window.jaFalou) {
                falar("Seja bem-vindo ao navegador otimizado web OS. Sistema carregado e pronto para uso.");
                window.jaFalou = true;
            }
        }, { once: true });

        async function perguntarIA() {
            const texto = input.value;
            if(!texto) return;

            input.placeholder = "IA Pensando...";
            input.value = "";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CHAVE}`;
            
            try {
                const response = await fetch(url, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Você é uma IA de suporte em uma LG TV. Responda de forma curta e amigável. Se for um erro, diga que resolveu. Pergunta do usuário: ${texto}` }] }] })
                });

                const data = await response.json();
                const respostaFinal = data.candidates[0].content.parts[0].text;

                // A IA FALA A RESPOSTA
                falar(respostaFinal);
                
                // MOSTRA NA TELA TAMBÉM
                input.placeholder = "IA respondeu!";
                setTimeout(() => { input.placeholder = "Fale o problema..."; }, 3000);

            } catch (e) {
                falar("Erro de conexão com o servidor. Tente novamente.");
                input.placeholder = "Erro de conexão!";
            }
        }
    </script>
</body>
</html>
