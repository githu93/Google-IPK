<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Navegador IA Paulo - webOS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; background-color: white; }
        #status-ia { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; border-radius: 5px; font-size: 12px; z-index: 999; border: 1px solid #00ff00; }
    </style>
</head>
<body>

    <div id="status-ia">IA: Monitorando...</div>
    
    <!-- O Navegador começa no Google -->
    <iframe id="minhaTV" src="https://www.google.com/webhp?igu=1"></iframe>

    <script>
        const API_KEY = "AIzaSyBh_JjoG8K2EKJqf2AAD3zUEd1MCO7GpCQ";
        const iframe = document.getElementById('minhaTV');
        const status = document.getElementById('status-ia');

        // 1. MONITOR DE ERROS E TRAVAMENTOS
        window.onerror = async function(msg, url, line) {
            status.innerText = "IA: Detectou erro! Corrigindo...";
            status.style.color = "yellow";
            
            // 2. CHAMA O GEMINI PARA ANALISAR O ERRO
            const prompt = `Estou em uma LG TV webOS. Ocorreu o erro: "${msg}" no site: "${iframe.src}". Gere um comando JS curto para tentar recuperar a página ou limpar o cache do iframe.`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                console.log("IA respondeu:", data);
                
                // 3. AUTO-REPARO (Recarrega ou limpa se o Gemini sugerir)
                iframe.src = iframe.src; // Tenta o refresh inteligente
                status.innerText = "IA: Erro mitigado!";
                status.style.color = "#00ff00";
            } catch (e) {
                status.innerText = "IA: Offline";
            }
        };

        // Dica: Se o TikTok travar, a IA vai tentar dar um "soft reset" no iframe
    </script>
</body>
</html>
