<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Navegador IA Paulo - Interativo</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #interface-ia { position: fixed; top: 0; width: 100%; background: rgba(20, 20, 20, 0.9); padding: 15px; z-index: 10000; border-bottom: 2px solid #00ff00; display: flex; gap: 10px; align-items: center; }
        #pergunta { flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #00ff00; background: #1a1a1a; color: #00ff00; outline: none; }
        #btn-enviar { padding: 10px 20px; background: #00ff00; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #navegador { width: 100%; height: calc(100% - 70px); margin-top: 70px; border: none; background: white; }
        #status-voz { color: #00ff00; font-size: 10px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="interface-ia">
        <input type="text" id="pergunta" placeholder="Fale o problema para a IA injetar o código...">
        <button id="btn-enviar" onclick="perguntarIA()">ENVIAR</button>
        <div id="status-voz">🔊 IA Ativa</div>
    </div>

    <iframe id="navegador" src="https://www.google.com/webhp?igu=1"></iframe>

    <script>
        const CHAVE = "AIzaSyBh_JjoG8K2EKJqf2AAD3zUEd1MCO7GpCQ";
        const PROJETO = "72336407577";
        const frame = document.getElementById('navegador');

        // 1. VOZ DE BOAS-VINDAS
        window.onload = function() {
            const mensagem = new SpeechSynthesisUtterance("Seja bem-vindo ao navegador otimizado webOS");
            mensagem.lang = "pt-BR";
            window.speechSynthesis.speak(mensagem);
        };

        // 2. FUNÇÃO PARA A IA INJETAR CÓDIGOS
        async function perguntarIA() {
            const input = document.getElementById('pergunta');
            const texto = input.value;
            if(!texto) return;

            input.placeholder = "IA pensando...";
            input.value = "";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CHAVE}`;
            
            const prompt = {
                contents: [{
                    parts: [{ text: `Você é uma IA de suporte para LG TV (Projeto ${PROJETO}). O usuário disse: "${texto}". Responda APENAS com um comando JavaScript curto para executar no navegador (ex: mudar URL ou estilo) ou uma orientação de 1 frase.` }]
                }]
            };

            try {
                const response = await fetch(url, { method: 'POST', body: JSON.stringify(prompt) });
                const data = await response.json();
                const respostaIA = data.candidates[0].content.parts[0].text;

                // TENTA EXECUTAR O CÓDIGO QUE A IA MANDOU (INJEÇÃO)
                try {
                    if(respostaIA.includes('window') || respostaIA.includes('document')) {
                        eval(respostaIA); // Injeta o código
                    }
                    const vozResposta = new SpeechSynthesisUtterance("Comando processado");
                    vozResposta.lang = "pt-BR";
                    window.speechSynthesis.speak(vozResposta);
                } catch(e) {
                    console.log("IA deu uma dica verbal");
                }
                
                alert("IA diz: " + respostaIA);
            } catch (e) {
                alert("Erro ao falar com o cérebro da IA.");
            }
        }
    </script>
</body>
</html>
