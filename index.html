<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>IA NAVIGATOR - STOP ERROR</title>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .container { border: 2px solid #00ff00; margin: 20px; padding: 20px; border-radius: 15px; }
        input { width: 80%; padding: 15px; background: #111; border: 1px solid #00ff00; color: #fff; font-size: 20px; }
        button { margin-top: 20px; padding: 15px 40px; background: #00ff00; color: #000; font-weight: bold; border: none; cursor: pointer; }
        #status { margin-top: 20px; color: yellow; }
    </style>
</head>
<body>

    <div class="container">
        <h1>IA WEBOS 23 - MODO SEGURO</h1>
        <p>Digite um site (ex: google.com) ou uma pergunta.</p>
        <input type="text" id="campo" placeholder="O que deseja fazer?">
        <br>
        <button onclick="processar()">EXECUTAR</button>
        <div id="status">SISTEMA PARADO - AGUARDANDO VOCÊ</div>
    </div>

    <script>
        const KEY = "AIzaSyBh_JjoG8K2EKJqf2AAD3zUEd1MCO7GpCQ";

        function falar(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = "pt-BR";
            window.speechSynthesis.speak(m);
        }

        // Libera a voz no primeiro toque
        window.onclick = () => { if(!window.v){ falar("Modo seguro ativado."); window.v=1; } };

        async function processar() {
            const input = document.getElementById('campo');
            const status = document.getElementById('status');
            const texto = input.value.toLowerCase();

            if(!texto) return;

            // REGRA 1: Se for site, pula a IA (ECONOMIZA PLANO E EVITA ERRO -27)
            if(texto.includes(".com") || texto.includes(".br") || texto.includes("www")) {
                status.innerText = "ABRINDO SITE EM TELA CHEIA...";
                falar("Abrindo site solicitado");
                setTimeout(() => {
                    // Isso mata o Erro -27 porque sai do app e vai pro navegador
                    window.location.href = texto.startsWith("http") ? texto : "https://" + texto;
                }, 1000);
                return;
            }

            // REGRA 2: Só gasta API se for uma pergunta real
            status.innerText = "CONSULTANDO IA...";
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Responda curto: " + texto }] }] })
                });
                const d = await r.json();
                const resposta = d.candidates[0].content.parts[0].text;
                
                falar(resposta);
                alert("IA diz: " + resposta);
                status.innerText = "PRONTO.";
            } catch (e) {
                status.innerText = "ERRO DE CONEXÃO.";
                falar("Erro ao conectar.");
            }
        }
    </script>
</body>
</html>
