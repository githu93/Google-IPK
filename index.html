<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chrome Gemini Pro</title>
    <style>
        body { margin: 0; background: #202124; font-family: sans-serif; overflow: hidden; }
        
        /* BARRA SUPERIOR IGUAL AO CHROME */
        #nav-bar { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: #202124; display: flex; align-items: center; 
            padding: 0 10px; border-bottom: 1px solid #3c4043; z-index: 1000;
        }

        .btn { background: none; border: none; padding: 8px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; }
        .btn:active { background: rgba(255,255,255,0.1); }
        .icon { fill: #f1f3f4; width: 22px; height: 22px; }

        #address-bar { 
            flex-grow: 1; background: #1a1a1a; border: none; 
            border-radius: 20px; padding: 8px 15px; color: #fff; 
            margin: 0 10px; outline: none; font-size: 14px;
        }

        /* BOLINHA GEMINI */
        #gemini { 
            width: 35px; height: 35px; background: linear-gradient(135deg, #4285f4, #9b72f3); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; cursor: pointer; border: 2px solid #fff;
        }

        /* O SITE (GOOGLE) */
        #content { width: 100%; height: calc(100vh - 50px); margin-top: 50px; border: none; background: #fff; }
    </style>
</head>
<body>

    <div id="nav-bar">
        <!-- SETA VOLTAR -->
        <button class="btn" onclick="voltar()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
        </button>
        <!-- SETA SEGUINTE -->
        <button class="btn" onclick="avancar()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"/></svg>
        </button>
        <!-- RECARREGAR -->
        <button class="btn" onclick="recarregar()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
        </button>

        <input type="text" id="address-bar" placeholder="Pesquisar no Google ou digitar URL" value="https://www.google.com">
        
        <div id="gemini" onclick="falar('Como posso ajudar?')">G</div>
    </div>

    <!-- O GOOGLE VAI CARREGAR AQUI DENTRO -->
    <iframe id="content" src="https://www.google.com/webhp?igu=1"></iframe>

    <script>
        const iframe = document.getElementById('content');

        function falar(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = "pt-BR";
            window.speechSynthesis.speak(m);
        }

        // Funções das Setas
        function voltar() { window.history.back(); }
        function avancar() { window.history.forward(); }
        function recarregar() { iframe.src = iframe.src; }

        // Abrir URL ao apertar Enter
        document.getElementById('address-bar').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                let url = e.target.value;
                if(!url.includes('http')) url = 'https://' + url;
                iframe.src = url;
                falar("Navegando para " + url);
            }
        });

        // Inicialização
        window.onclick = () => { if(!window.v){ falar("Google Chrome ativado na TV LG."); window.v=1; } };
    </script>
</body>
</html>
