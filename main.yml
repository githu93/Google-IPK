name: Build IPK Paulo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Motores
        run: |
          sudo apt-get update
          # Mudamos aqui para o robô não procurar o pacote que não existe
          sudo apt-get install -y qtbase5-dev qt5-qmake build-essential

      - name: Ferramentas LG
        run: |
          sudo npm install -g @webos-tools/cli --unsafe-perm

      - name: Compilar
        run: |
          qmake -qt=qt5
          make

      - name: Gerar Pacote
        run: |
          mkdir -p build
          ares-package . --out ./build

      - name: Download do IPK
        uses: actions/upload-artifact@v4
        with:
          name: App-Paulo-TV
          path: ./build/*.ipk
